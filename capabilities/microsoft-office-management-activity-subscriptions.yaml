naftiko: 1.0.0-alpha2
info:
  label: Microsoft Office Integration Microsoft Office 365 Management Activity API — Subscriptions
  description: 'Microsoft Office Integration Microsoft Office 365 Management Activity API — Subscriptions. 5 operations. Lead
    operation: Microsoft Office Integration List available content. Self-contained Naftiko capability covering one Microsoft
    Office Integration business surface.'
  tags:
  - Microsoft Office Integration
  - Subscriptions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_OFFICE_INTEGRATION_API_KEY: MICROSOFT_OFFICE_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: microsoft-office-management-activity-subscriptions
    baseUri: https://manage.office.com/api/v1.0/{tenantId}/activity/feed
    description: Microsoft Office Integration Microsoft Office 365 Management Activity API — Subscriptions business capability.
      Self-contained, no shared references.
    resources:
    - name: subscriptions-content
      path: /subscriptions/content
      operations:
      - name: listavailablecontent
        method: GET
        description: Microsoft Office Integration List available content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contentType
          in: query
          type: string
          required: true
        - name: PublisherIdentifier
          in: query
          type: string
        - name: startTime
          in: query
          type: string
          description: Start of the time range (UTC). Must be specified together with endTime and no more than 24 hours apart.
        - name: endTime
          in: query
          type: string
          description: End of the time range (UTC). Must be specified together with startTime and no more than 24 hours apart.
    - name: subscriptions-list
      path: /subscriptions/list
      operations:
      - name: listsubscriptions
        method: GET
        description: Microsoft Office Integration List current subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: PublisherIdentifier
          in: query
          type: string
    - name: subscriptions-notifications
      path: /subscriptions/notifications
      operations:
      - name: listnotifications
        method: GET
        description: Microsoft Office Integration List notifications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contentType
          in: query
          type: string
          required: true
        - name: PublisherIdentifier
          in: query
          type: string
        - name: startTime
          in: query
          type: string
        - name: endTime
          in: query
          type: string
    - name: subscriptions-start
      path: /subscriptions/start
      operations:
      - name: startsubscription
        method: POST
        description: Microsoft Office Integration Start a subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contentType
          in: query
          type: string
          description: Must be a valid content type.
          required: true
        - name: PublisherIdentifier
          in: query
          type: string
          description: The tenant GUID of the vendor coding against the API. Used for throttling the request rate.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: subscriptions-stop
      path: /subscriptions/stop
      operations:
      - name: stopsubscription
        method: POST
        description: Microsoft Office Integration Stop a subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contentType
          in: query
          type: string
          required: true
        - name: PublisherIdentifier
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_OFFICE_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: microsoft-office-management-activity-subscriptions-rest
    port: 8080
    description: REST adapter for Microsoft Office Integration Microsoft Office 365 Management Activity API — Subscriptions.
      One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/subscriptions/content
      name: subscriptions-content
      description: REST surface for subscriptions-content.
      operations:
      - method: GET
        name: listavailablecontent
        description: Microsoft Office Integration List available content
        call: microsoft-office-management-activity-subscriptions.listavailablecontent
        with:
          contentType: rest.contentType
          PublisherIdentifier: rest.PublisherIdentifier
          startTime: rest.startTime
          endTime: rest.endTime
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscriptions/list
      name: subscriptions-list
      description: REST surface for subscriptions-list.
      operations:
      - method: GET
        name: listsubscriptions
        description: Microsoft Office Integration List current subscriptions
        call: microsoft-office-management-activity-subscriptions.listsubscriptions
        with:
          PublisherIdentifier: rest.PublisherIdentifier
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscriptions/notifications
      name: subscriptions-notifications
      description: REST surface for subscriptions-notifications.
      operations:
      - method: GET
        name: listnotifications
        description: Microsoft Office Integration List notifications
        call: microsoft-office-management-activity-subscriptions.listnotifications
        with:
          contentType: rest.contentType
          PublisherIdentifier: rest.PublisherIdentifier
          startTime: rest.startTime
          endTime: rest.endTime
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscriptions/start
      name: subscriptions-start
      description: REST surface for subscriptions-start.
      operations:
      - method: POST
        name: startsubscription
        description: Microsoft Office Integration Start a subscription
        call: microsoft-office-management-activity-subscriptions.startsubscription
        with:
          contentType: rest.contentType
          PublisherIdentifier: rest.PublisherIdentifier
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscriptions/stop
      name: subscriptions-stop
      description: REST surface for subscriptions-stop.
      operations:
      - method: POST
        name: stopsubscription
        description: Microsoft Office Integration Stop a subscription
        call: microsoft-office-management-activity-subscriptions.stopsubscription
        with:
          contentType: rest.contentType
          PublisherIdentifier: rest.PublisherIdentifier
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: microsoft-office-management-activity-subscriptions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Office Integration Microsoft Office 365 Management Activity API — Subscriptions.
      One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: microsoft-office-integration-list-available
      description: Microsoft Office Integration List available content
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: microsoft-office-management-activity-subscriptions.listavailablecontent
      with:
        contentType: tools.contentType
        PublisherIdentifier: tools.PublisherIdentifier
        startTime: tools.startTime
        endTime: tools.endTime
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-office-integration-list-current
      description: Microsoft Office Integration List current subscriptions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: microsoft-office-management-activity-subscriptions.listsubscriptions
      with:
        PublisherIdentifier: tools.PublisherIdentifier
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-office-integration-list-notifications
      description: Microsoft Office Integration List notifications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: microsoft-office-management-activity-subscriptions.listnotifications
      with:
        contentType: tools.contentType
        PublisherIdentifier: tools.PublisherIdentifier
        startTime: tools.startTime
        endTime: tools.endTime
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-office-integration-start-subscription
      description: Microsoft Office Integration Start a subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: microsoft-office-management-activity-subscriptions.startsubscription
      with:
        contentType: tools.contentType
        PublisherIdentifier: tools.PublisherIdentifier
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-office-integration-stop-subscription
      description: Microsoft Office Integration Stop a subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: microsoft-office-management-activity-subscriptions.stopsubscription
      with:
        contentType: tools.contentType
        PublisherIdentifier: tools.PublisherIdentifier
      outputParameters:
      - type: object
        mapping: $.
